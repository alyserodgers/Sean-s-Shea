<!DOCTYPE html>
<html>
<head>
  <title>Contact / Order</title>
  <meta name="description" content="Contact form for ordering shea butter and oil products">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<nav>
  <a href="index.html">Home</a>
  <a href="products.html">Products</a>
  <a href="about.html">About</a>
  <a href="contact.html">Contact</a>
</nav>

<section>
  <h1>Contact / Order</h1>

  <form id="myForm">
    <label>Name:</label><br>
    <input type="text" id="name"><br><br>

    <label>Email:</label><br>
    <input type="email" id="email"><br><br>

    <label>What do you want to order?</label><br>
    <textarea id="order"></textarea><br><br>

    <button type="submit">Submit</button>
  </form>

  <p id="message"></p>
</section>

<script>
document.getElementById("myForm").addEventListener("submit", function(event) {
  event.preventDefault();

  let name = document.getElementById("name").value;
  let email = document.getElementById("email").value;
  let order = document.getElementById("order").value;

  if (name === "" || email === "" || order === "") {
    document.getElementById("message").textContent = "Please fill out all fields.";
  } else {
    document.getElementById("message").textContent = "Thanks! We will contact you soon.";
  }
});
</script>

</body>
</html>
